<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>CSS Propriedades</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: cornflowerblue;
      color: white;
      font-size: 18px;
    }
    
    html {
      font-size: 30px;
    }

    .color {
      color: coral;
    }

    .font-size {
      font-size: 1rem;
    }

    .font-weight {
      font-weight: 900;
    }

    .font-family {
      font-family: 'Caveat', cursive;
    }

    .text-align {
      text-align: left;
    }
  </style>
</head>
<body>
  <h1>Important CSS Properties</h1>
  <p class="color">Color</p>
  <p class="font-size">Font Size</p>
  <p class="font-weight">Font Weight</p>
  <p class="font-family">Font Family</p>
  <p class="text-align">Text Align</p>
</body>
</html>
